<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>T7 TOKYO | Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --pink:   #e40057;
      --teal:   #00bcd4;
      --green:  #39cb54;
      --orange: #ff9c00;
    }

    body { font-family: 'Hiragino Sans', 'Yu Gothic', Arial, sans-serif; background: #f0f0f0; color: #333; }
    a { text-decoration: none; color: inherit; }

    /* ── SHIMMER ── */
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    /* ── DESKTOP HEADER ── */
    .pc-header { background: white; border-bottom: 3px solid var(--pink); }
    .header-inner {
      max-width: 1000px; margin: 0 auto;
      padding: 12px 16px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
    }
    .logo-block { text-align: center; }
    .logo-name {
      font-size: 28px; font-weight: 900; font-style: italic;
      letter-spacing: 3px; line-height: 1;
      background: linear-gradient(90deg, var(--pink) 0%, #ff6b8a 40%, #fff 50%, #ff6b8a 60%, var(--pink) 100%);
      background-size: 200% auto;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      animation: shimmer 3.5s linear infinite;
    }
    .logo-sub { font-size: 10px; color: #888; margin-top: 2px; letter-spacing: 1px; }

    .lang-toggle {
      display: flex; align-items: center; gap: 4px;
      background: #f5f5f5; border-radius: 20px; padding: 3px;
      border: 1px solid #e0e0e0;
    }
    .lang-btn {
      padding: 4px 12px; border-radius: 16px;
      font-size: 12px; font-weight: bold; cursor: pointer;
      border: none; background: transparent; color: #888; transition: all 0.2s;
    }
    .lang-btn.active { background: var(--pink); color: white; box-shadow: 0 2px 6px rgba(228,0,87,0.35); }

    /* ── DESKTOP NAV ── */
    .pc-nav { background: white; border-bottom: 2px solid var(--pink); }
    .nav-contacts { max-width: 1000px; margin: 0 auto; display: flex; align-items: center; gap: 8px; padding: 8px 16px; }

    .nc-home {
      font-size: 17px; font-family: 'Bebas Neue', 'Rajdhani', sans-serif;
      font-weight: 400; font-style: normal;
      color: white; letter-spacing: 3px;
      padding: 6px 14px; border-radius: 6px;
      white-space: nowrap; flex-shrink: 0;
      display: flex; align-items: center; gap: 7px;
      cursor: pointer; text-decoration: none;
      background: linear-gradient(135deg, var(--pink) 0%, #b8003f 100%);
      box-shadow: 0 2px 10px rgba(228,0,87,0.4);
      transition: filter 0.18s, transform 0.15s, box-shadow 0.18s;
      position: relative; overflow: hidden;
    }
    .nc-home::after {
      content: '';
      position: absolute; top: 0; left: -100%;
      width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.4s ease;
    }
    .nc-home:hover::after { left: 150%; }
    .nc-home:hover { filter: brightness(1.12); box-shadow: 0 4px 16px rgba(228,0,87,0.55); transform: translateY(-1px); }
    .nc-home:active { transform: scale(0.97); }
    .nc-logo-icon {
      width: 16px; height: 16px; flex-shrink: 0;
      fill: white;
    }
    .nc-divider { width: 1px; height: 24px; background: #e0e0e0; flex-shrink: 0; }

    .nc-btn { display: flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 5px; font-size: 13px; font-weight: bold; color: white; transition: filter 0.15s, transform 0.1s; }
    .nc-btn:hover  { filter: brightness(0.9); }
    .nc-btn:active { transform: scale(0.96); }
    .nc-btn svg { width: 17px; height: 17px; flex-shrink: 0; }
    .nc-channel { background: var(--pink); }
    .nc-tg      { background: #42A5F5; }
    .nc-line    { background: #66BB6A; }
    .nc-wa      { background: #2E7D32; }

    /* ── MOBILE HEADER ── */
    .sp-header { display: none; background: white; border-bottom: 3px solid var(--pink); }
    .sp-header-top { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; }
    .sp-header-left { display: flex; align-items: center; gap: 8px; }

    /* Back arrow button in mobile header (profile page only) */
    .sp-back-btn {
      display: flex; align-items: center; justify-content: center;
      width: 34px; height: 34px; flex-shrink: 0;
      background: var(--pink); border-radius: 50%;
      color: white; text-decoration: none;
      transition: filter 0.15s, transform 0.1s;
    }
    .sp-back-btn:active { filter: brightness(0.82); transform: scale(0.94); }
    .sp-back-btn svg { width: 18px; height: 18px; fill: white; }
    .sp-logo {
      display: flex; flex-direction: column; align-items: flex-start;
      gap: 0; line-height: 1;
      text-decoration: none; cursor: pointer;
      transition: opacity 0.15s;
    }
    .sp-logo:active { opacity: 0.75; }
    .sp-logo-main {
      font-size: 17px; font-weight: 900; font-style: italic; letter-spacing: 2px;
      background: linear-gradient(90deg, var(--pink), #ff6b8a 50%, var(--pink));
      background-size: 200% auto;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      animation: shimmer 3.5s linear infinite;
    }
    .sp-logo-sub {
      font-size: 9px; font-weight: 700; letter-spacing: 2.5px;
      text-transform: uppercase; font-style: normal;
      color: #aaa; -webkit-text-fill-color: #aaa;
    }
    .sp-lang { display: flex; align-items: center; gap: 2px; background: #f5f5f5; border-radius: 14px; padding: 2px; border: 1px solid #e0e0e0; }
    .sp-lang .lang-btn { padding: 3px 9px; font-size: 11px; }
    .sp-menu-btn {
      width: 40px; height: 40px; background: var(--pink); border-radius: 50%;
      border: none; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; flex-shrink: 0;
    }
    .sp-menu-btn .b { display: block; width: 18px; height: 2px; background: white; border-radius: 1px; }

    /* ── OVERLAY MENU ── */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 500; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .overlay.on { opacity: 1; pointer-events: all; }
    .side-menu {
      position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
      background: white; z-index: 600; display: flex; flex-direction: column;
      transition: left 0.35s cubic-bezier(0.4,0,0.2,1); overflow-y: auto;
    }
    .side-menu.on { left: 0; }
    .sm-head { background: var(--pink); padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; }
    .sm-head .title { color: white; font-size: 18px; font-weight: 900; font-style: italic; text-decoration: none; transition: opacity 0.15s; }
    .sm-head .title:active { opacity: 0.75; }
    .sm-close { background: rgba(255,255,255,0.2); border: none; color: white; width: 32px; height: 32px; border-radius: 50%; font-size: 17px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .sm-btns { padding: 16px 14px 20px; display: flex; flex-direction: column; gap: 8px; }
    .sm-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 13px; border-radius: 8px; font-size: 14px; font-weight: bold; color: white;
      transition: opacity 0.15s, transform 0.1s; box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    .sm-btn:hover  { opacity: 0.88; }
    .sm-btn:active { transform: scale(0.97); }

    /* ── BREADCRUMB ── */
    .breadcrumb { max-width: 1000px; margin: 0 auto; padding: 8px 12px; font-size: 12px; color: #888; }
    .breadcrumb a { color: var(--pink); }
    .breadcrumb a:hover { text-decoration: underline; }

    /* ── PAGE WRAP ── */
    .page-wrap { max-width: 1000px; margin: 0 auto; padding: 12px 12px 90px; }

    /* ── LOADER ── */
    .loader { text-align: center; padding: 80px; }
    .spinner { display: inline-block; width: 44px; height: 44px; border: 4px solid #fce4ec; border-top-color: var(--pink); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── PROFILE LAYOUT ── */
    .profile-wrap { display: flex; gap: 16px; align-items: flex-start; }

    /* ── LEFT: SLIDER ── */
    .profile-left { width: 340px; flex-shrink: 0; }
    .slider-main { background: white; position: relative; overflow: hidden; border: 1px solid #e0e0e0; margin-bottom: 6px; border-radius: 6px; }

    /* ── BACK BUTTON ── */
    .slider-back {
      position: absolute; top: 10px; left: 10px; z-index: 10;
      display: flex; align-items: center; gap: 5px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
      color: white; font-size: 12px; font-weight: bold;
      padding: 6px 12px; border-radius: 20px;
      text-decoration: none; letter-spacing: 0.3px;
      border: 1px solid rgba(255,255,255,0.18);
      transition: background 0.2s, transform 0.15s;
    }
    .slider-back:hover { background: rgba(228,0,87,0.82); transform: translateY(-1px); }
    .slider-back:active { transform: scale(0.96); }
    .slider-back svg { width: 14px; height: 14px; fill: white; flex-shrink: 0; }
    .slider-track { display: flex; transition: transform 0.38s cubic-bezier(0.4,0,0.2,1); }
    .slide { min-width: 100%; }
    .slide img { width: 100%; display: block; aspect-ratio: 3/4; object-fit: cover; }
    .s-btn {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 36px; height: 36px; background: rgba(0,0,0,0.6); color: white;
      border: none; border-radius: 50%; font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; z-index: 5; transition: background 0.2s;
    }
    .s-btn:hover { background: rgba(228,0,87,0.8); }
    .s-btn.prev { left: 8px; }
    .s-btn.next { right: 8px; }
    .slider-thumbs { display: flex; gap: 4px; }
    .thumb { flex: 1; cursor: pointer; overflow: hidden; border: 2px solid transparent; transition: border-color 0.15s; border-radius: 4px; }
    .thumb.active { border-color: var(--pink); }
    .thumb img { width: 100%; aspect-ratio: 3/4; object-fit: cover; display: block; }

    /* ── RIGHT: INFO ── */
    .profile-right { flex: 1; min-width: 0; }
    .profile-name-box { background: white; border: 1px solid #e0e0e0; padding: 16px; margin-bottom: 8px; border-top: 4px solid var(--pink); border-radius: 0 0 6px 6px; }
    .pname { font-size: 26px; font-weight: 900; color: var(--pink); margin-bottom: 4px; }
    .pname-romaji { font-size: 13px; color: #888; margin-bottom: 10px; letter-spacing: 1px; }
    .pmeas { font-size: 14px; color: #555; margin-bottom: 8px; }
    .pmeas .cup { color: var(--pink); font-weight: bold; }
    .pstatus { display: inline-block; padding: 5px 14px; border-radius: 3px; font-size: 13px; font-weight: bold; color: white; }
    .s-pink { background: var(--pink); }
    .s-teal { background: var(--teal); }
    .s-dark { background: #c62828; }
    .s-orange { background: var(--orange); }

    /* Info table */
    .info-table { background: white; border: 1px solid #e0e0e0; width: 100%; border-collapse: collapse; margin-bottom: 8px; font-size: 13px; border-radius: 6px; overflow: hidden; }
    .info-table tr { border-bottom: 1px solid #f0f0f0; }
    .info-table tr:last-child { border-bottom: none; }
    .info-table th { background: #fafafa; width: 90px; padding: 10px 12px; font-weight: bold; color: #555; text-align: left; vertical-align: top; border-right: 1px solid #f0f0f0; }
    .info-table td { padding: 10px 12px; color: #333; }

    /* ── PRICE TABLE ── */
    .price-table-wrap {
      margin-bottom: 8px; border-radius: 6px; overflow: hidden;
      border: 1px solid #222; box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }
    .price-table { width: 100%; border-collapse: collapse; }
    .price-table th {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
      color: white; text-align: center;
      padding: 10px 4px; font-size: 12px; font-weight: 800;
      letter-spacing: 0.5px;
      border-right: 1px solid rgba(255,255,255,0.12);
      position: relative; overflow: hidden;
    }
    .price-table th::before {
      content: ''; position: absolute; inset: 0;
      background: repeating-linear-gradient(
        45deg, transparent, transparent 4px,
        rgba(255,255,255,0.03) 4px, rgba(255,255,255,0.03) 8px
      );
    }
    .price-table th:last-child { border-right: none; }
    .price-table td {
      background: white; text-align: center;
      padding: 12px 4px; font-size: 13px; font-weight: 600; color: #222;
      border-right: 1px solid #e8e8e8;
    }
    .price-table td:last-child { border-right: none; }
    .price-table tr.price-row td { border-top: 1px solid #eee; }

    /* ── MOBILE BOTTOM CTA ── */
    .mob-cta {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0;
      z-index: 400; box-shadow: 0 -3px 14px rgba(0,0,0,0.3);
      padding-bottom: env(safe-area-inset-bottom, 0);
    }
    .mob-cta-inner { display: flex; height: 58px; }
    .mob-cta-btn {
      flex: 1; display: flex; flex-direction: row;
      align-items: center; justify-content: center;
      gap: 7px; color: white; font-size: 13px; font-weight: 800;
      text-decoration: none; border-right: 1px solid rgba(255,255,255,0.25);
      transition: filter 0.15s;
    }
    .mob-cta-btn:last-child { border-right: none; }
    .mob-cta-btn:active { filter: brightness(0.82); }
    .mob-cta-btn svg { width: 22px; height: 22px; flex-shrink: 0; }
    .mob-cta-tg   { background: #42A5F5; }
    .mob-cta-line { background: #66BB6A; }
    .mob-cta-wa   { background: #2E7D32; }

    /* ── SCROLL TOP ── */
    .btn-top {
      position: fixed; bottom: 74px; right: 16px;
      width: 42px; height: 42px; background: var(--pink); color: white;
      border: none; border-radius: 50%; font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s, transform 0.2s; z-index: 300;
      box-shadow: 0 3px 10px rgba(228,0,87,0.4);
    }
    .btn-top.show { opacity: 1; pointer-events: all; }
    .btn-top:hover { transform: scale(1.1); }

    /* ── FOOTER ── */
    .site-footer {
      background: #1a1a1a; color: #aaa;
      padding: 14px 20px 80px; text-align: center; font-size: 12px;
    }
    .footer-logo { font-size: 18px; font-weight: 900; font-style: italic; color: var(--pink); margin-bottom: 4px; }
    .footer-copy { color: #666; font-size: 11px; }

    /* ── SAKURA BRANCHES ── */
    .sakura-bg {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
      overflow: hidden;
    }
    .sakura-br { position: absolute; opacity: 0.09; }
    .sakura-br-tr  { top: -20px; right: -20px; width: 320px; height: 420px; }
    .sakura-br-bl  { bottom: 60px; left: -30px; width: 260px; height: 360px; transform: scaleX(-1) rotate(15deg); }
    .sakura-br-mid { top: 40%; right: -40px; width: 180px; height: 250px; opacity: 0.06; transform: rotate(-20deg); }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .pc-header { display: none; }
      .pc-nav    { display: none; }
      .sp-header { display: block; }
      .mob-cta   { display: block; }
      .profile-wrap  { flex-direction: column; align-items: center; }
      .profile-left  { width: 100%; max-width: 420px; }
      .profile-right { width: 100%; max-width: 420px; }
      .pname { font-size: 22px; }
      .page-wrap { padding: 10px 10px 76px; }
    }
  </style>
</head>

        <svg viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/></svg>
        <span data-i18n="nav_wa">ワッツアップ</span>

  </div>

  <button class="btn-top" id="btnTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://mqbsyxvebsjntbzuvtfu.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xYnN5eHZlYnNqbnRienV2dGZ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3OTE3MjQsImV4cCI6MjA4ODM2NzcyNH0.rPjPAspwjRBE3js_606VozG8wjpM6QHcUJwl2NZzZd8';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const defaultSeeds = [
      [64,65,1062,66],[91,92,1025,93],[42,43,1041,44],[1074,1075,1076,1077],
      [1025,1026,1027,1028],[1031,1032,1033,1034],[1041,1042,1043,1044],
      [1048,1049,1050,1051],[1055,1056,1057,1058]
    ];

    /* ---- Translations ---- */
    const T = {
      ja: {
        tagline:     '東京プレミアムモデル',
        fav_models:  '⭐ 厳選モデル',
        bc_top:      'トップ',
        bc_sched:    '出勤情報',
        back_btn:    '戻る',
        th_schedule: '出勤時間',
        th_height:   '身長',
        th_style:    'スタイル',
        th_age:      '年齢',
        th_status:   '状況',
        unit_age:    '歳',
        unit_cm:     'cm',
        nav_tg:      'テレグラム',
        nav_line:    'LINE',
        nav_wa:      'ワッツアップ',
        status_avail:   '受付中',
        status_duty:    '出勤中',
        status_limited: '限定',
        status_vip:     'VIP',
        status_booked:  '予約済',
        footer_copy: '© 2024 T7 TOKYO. All Rights Reserved.',
      },
      en: {
        tagline:     'Tokyo Premium Models',
        fav_models:  '⭐ Featured Models',
        bc_top:      'Top',
        bc_sched:    'Schedule',
        back_btn:    'Back',
        th_schedule: 'Schedule',
        th_height:   'Height',
        th_style:    'Measurements',
        th_age:      'Age',
        th_status:   'Status',
        unit_age:    ' y.o.',
        unit_cm:     'cm',
        nav_tg:      'Telegram',
        nav_line:    'LINE',
        nav_wa:      'WhatsApp',
        status_avail:   'Available',
        status_duty:    'On Duty',
        status_limited: 'Limited',
        status_vip:     'VIP Only',
        status_booked:  'Reserved',
        footer_copy: '© 2024 T7 TOKYO. All Rights Reserved.',
      }
    };

    /* Status color → translation key */
    const statusKeyMap = {
      's-pink':   'status_avail',
      's-dark':   'status_vip',
      's-teal':   'status_duty',
      's-orange': 'status_limited',
      's-sold':   'status_booked',
    };

    /* ---- Lang ---- */
    let currentLang = localStorage.getItem('lang') || 'ja';
    let currentRow = null;

    function getStatusText(lang, row) {
      const key = statusKeyMap[row.status_color];
      return (key && T[lang][key]) ? T[lang][key] : row.status;
    }

    function renderTable(lang) {
      if (!currentRow) return;
      const r = currentRow;
      document.getElementById('infoTable').innerHTML = `
        <tr><th>${T[lang].th_schedule}</th><td>${r.schedule}</td></tr>
        <tr><th>${T[lang].th_height}</th><td>${r.height}${T[lang].unit_cm}</td></tr>
        <tr><th>${T[lang].th_style}</th><td>B${r.bust}(${r.cup}) - W${r.waist} - H${r.hips}</td></tr>
        <tr><th>${T[lang].th_age}</th><td>${r.age}${T[lang].unit_age}</td></tr>
        <tr><th>${T[lang].th_status}</th><td><span class="pstatus ${r.status_color}" style="font-size:12px;padding:3px 10px">${getStatusText(lang, r)}</span></td></tr>
      `;
      /* ── Price table ── */
      const wrap = document.getElementById('priceTableWrap');
      let prices = null;
      try { prices = r.prices ? JSON.parse(r.prices) : null; } catch(e) {}
      if (prices && Object.keys(prices).length) {
        const durations = [
          { key:'p60',  label:'60min'  },
          { key:'p75',  label:'75min'  },
          { key:'p100', label:'100min' },
          { key:'p120', label:'120min' },
          { key:'p180', label:'180min' },
        ];
        const hasPrices = durations.some(d => prices[d.key]);
        if (hasPrices) {
          wrap.innerHTML = `
            <div class="price-table-wrap">
              <table class="price-table">
                <thead><tr>${durations.map(d => `<th>${d.label}</th>`).join('')}</tr></thead>
                <tbody><tr class="price-row">${durations.map(d =>
                  `<td>${prices[d.key] ? Number(prices[d.key]).toLocaleString('ja-JP') + '円' : '—'}</td>`
                ).join('')}</tr></tbody>
              </table>
            </div>`;
        } else { wrap.innerHTML = ''; }
      } else { wrap.innerHTML = ''; }
    }

    function setLang(lang) {
      currentLang = lang;
      localStorage.setItem('lang', lang);
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (T[lang][key] !== undefined) el.textContent = T[lang][key];
      });
      document.querySelectorAll('[data-status-color]').forEach(el => {
        const color = el.dataset.statusColor;
        const key = statusKeyMap[color];
        el.textContent = (key && T[lang][key]) ? T[lang][key] : el.dataset.statusJa;
      });
      document.querySelectorAll('.lang-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.lang === lang)
      );
      renderTable(lang);
    }

    /* ---- Menu ---- */
    function openMenu()  { document.getElementById('sideMenu').classList.add('on'); document.getElementById('overlay').classList.add('on'); }
    function closeMenu() { document.getElementById('sideMenu').classList.remove('on'); document.getElementById('overlay').classList.remove('on'); }
    window.addEventListener('scroll', () => document.getElementById('btnTop').classList.toggle('show', scrollY > 200));

    let photoUrls = [], cur = 0;
    function goTo(n) {
      cur = (n + photoUrls.length) % photoUrls.length;
      document.getElementById('track').style.transform = `translateX(-${cur * 100}%)`;
      document.querySelectorAll('.thumb').forEach((t, i) => t.classList.toggle('active', i === cur));
    }
    function slide(dir) { goTo(cur + dir); }

    async function init() {
      const id = parseInt(new URLSearchParams(location.search).get('id'));
      const { data: row, error } = await sb.from('models').select('*').eq('id', id).single();
      document.getElementById('loader').style.display = 'none';
      if (error || !row) {
        document.body.innerHTML += `<div style="text-align:center;padding:60px;color:#e40057;font-size:16px">Model not found.<br><a href="index.html" style="color:#e40057">← Back</a></div>`;
        return;
      }

      document.title = `${row.name}(${row.age}) | T7 TOKYO`;
      document.getElementById('bcName').textContent = `${row.name}(${row.age})`;
      document.getElementById('pname').textContent  = `${row.name}(${row.age})`;
      document.getElementById('pmeas').innerHTML    = `T${row.height} - B${row.bust}<span class="cup">(${row.cup})</span> - W${row.waist} - H${row.hips}`;

      const sEl = document.getElementById('pstatus');
      sEl.textContent = getStatusText(currentLang, row);
      sEl.className   = `pstatus ${row.status_color}`;
      sEl.setAttribute('data-status-color', row.status_color);
      sEl.setAttribute('data-status-ja', row.status);

      currentRow = row;
      renderTable(currentLang);

      const seeds = defaultSeeds[0] || [10,11,12,13];

      // Try to use the full photos array saved by the admin panel
      let parsedPhotos = [];
      if (row.photos) {
        try { parsedPhotos = JSON.parse(row.photos).filter(u => !!u); } catch(e) {}
      }
      // Fall back: single photo_url, or placeholder seeds
      if (!parsedPhotos.length && row.photo_url) parsedPhotos = [row.photo_url];
      photoUrls = parsedPhotos.length
        ? parsedPhotos
        : seeds.map(s => `https://picsum.photos/seed/${s}/400/533`);
      const thumbUrls = photoUrls; // same URLs for thumbs

      const track    = document.getElementById('track');
      const thumbsEl = document.getElementById('thumbs');
      photoUrls.forEach((src, i) => {
        const sl = document.createElement('div'); sl.className = 'slide';
        sl.innerHTML = `<img src="${src}" alt="" loading="lazy">`;
        track.appendChild(sl);
        const th = document.createElement('div'); th.className = 'thumb' + (i === 0 ? ' active' : '');
        th.innerHTML = `<img src="${thumbUrls[i]}" alt="" loading="lazy">`;
        th.onclick = () => goTo(i);
        thumbsEl.appendChild(th);
      });

      if (row.video_url) {
        document.getElementById('profileVideo').src = row.video_url;
        document.getElementById('videoWrap').style.display = 'block';
      }

      document.getElementById('content').style.display = 'block';

      let sx = 0, sy = 0, isHoriz = false;
      track.addEventListener('touchstart', e => {
        sx = e.touches[0].clientX;
        sy = e.touches[0].clientY;
        isHoriz = false;
      }, { passive: true });
      track.addEventListener('touchmove', e => {
        const dx = Math.abs(e.touches[0].clientX - sx);
        const dy = Math.abs(e.touches[0].clientY - sy);
        if (!isHoriz && dx > dy && dx > 8) isHoriz = true;
        if (isHoriz) e.preventDefault();
      }, { passive: false });
      track.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].clientX - sx;
        if (isHoriz && Math.abs(dx) > 30) slide(dx < 0 ? 1 : -1);
        isHoriz = false;
      });
    }

    setLang(currentLang);
    init();
  </script>
</body>
</html>
