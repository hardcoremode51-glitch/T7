<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>T7 TOKYO | Tokyo Premium Models</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --pink:   #e40057;
      --teal:   #00bcd4;
      --green:  #39cb54;
      --orange: #ff9c00;
      --red:    #ff2442;
      --dark:   #222;
      --gray:   #555;
      --light:  #f5f5f5;
    }

    body {
      font-family: 'Hiragino Sans', 'Yu Gothic', 'Meiryo', Arial, sans-serif;
      background: #f0f0f0;
      color: #333;
      min-height: 100vh;
    }

    a { text-decoration: none; color: inherit; }

    /* =====================================================
       DESKTOP HEADER
    ===================================================== */
    .pc-header {
      background: white;
      border-bottom: 3px solid var(--pink);
    }

    .header-inner {
      max-width: 1000px;
      margin: 0 auto;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    /* Logo shimmer */
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    .logo-block { text-align: center; }
    .logo-name {
      font-size: 32px;
      font-weight: 900;
      font-style: italic;
      letter-spacing: 3px;
      line-height: 1;
      background: linear-gradient(90deg, var(--pink) 0%, #ff6b8a 40%, #fff 50%, #ff6b8a 60%, var(--pink) 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3.5s linear infinite;
    }
    .logo-sub {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
      letter-spacing: 1px;
    }

    /* Lang toggle desktop */
    .lang-toggle {
      display: flex;
      align-items: center;
      gap: 4px;
      background: #f5f5f5;
      border-radius: 20px;
      padding: 3px;
      border: 1px solid #e0e0e0;
    }
    .lang-btn {
      padding: 4px 12px;
      border-radius: 16px;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      border: none;
      background: transparent;
      color: #888;
      transition: all 0.2s;
    }
    .lang-btn.active {
      background: var(--pink);
      color: white;
      box-shadow: 0 2px 6px rgba(228,0,87,0.35);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* =====================================================
       DESKTOP NAVIGATION
    ===================================================== */
    .pc-nav {
      background: white;
      border-bottom: 2px solid var(--pink);
    }

    /* Section sweep animation */
    @keyframes sweep {
      from { transform: scaleX(0); transform-origin: left; }
      to   { transform: scaleX(1); transform-origin: left; }
    }

    .nav-contacts {
      max-width: 1000px; margin: 0 auto;
      display: flex; align-items: center; gap: 8px;
      padding: 8px 16px;
    }
    .nc-home {
      font-size: 15px;
      font-weight: 900;
      font-style: italic;
      color: var(--pink);
      letter-spacing: 2px;
      padding: 5px 12px;
      border: 2px solid var(--pink);
      border-radius: 5px;
      white-space: nowrap;
      flex-shrink: 0;
      display: flex; align-items: center; gap: 6px;
      cursor: default; user-select: none;
    }
    .nc-logo-icon {
      width: 16px; height: 16px; flex-shrink: 0;
      fill: var(--pink);
    }

    .nc-divider {
      width: 1px; height: 24px;
      background: #e0e0e0;
      flex-shrink: 0;
    }

    .nc-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: 5px;
      font-size: 13px; font-weight: bold; color: white;
      text-decoration: none; transition: filter 0.15s, transform 0.1s;
    }
    .nc-btn:hover  { filter: brightness(0.9); }
    .nc-btn:active { transform: scale(0.96); }
    .nc-btn svg { width: 17px; height: 17px; flex-shrink: 0; }
    .nc-channel { background: var(--pink); }
    .nc-tg      { background: #42A5F5; }
    .nc-line    { background: #66BB6A; }
    .nc-wa      { background: #2E7D32; }

    /* =====================================================
       MOBILE HEADER
    ===================================================== */
    .sp-header {
      display: none;
      background: white;
      border-bottom: 3px solid var(--pink);
    }

    .sp-header-top {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
    }

    .sp-header-left { display: flex; align-items: center; gap: 8px; }

    .sp-logo {
      display: flex; align-items: center; gap: 5px;
      font-size: 20px; font-weight: 900; font-style: italic;
      letter-spacing: 2px;
      background: linear-gradient(90deg, var(--pink), #ff6b8a 50%, var(--pink));
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3.5s linear infinite;
    }
    .sp-logo-icon {
      width: 18px; height: 18px; flex-shrink: 0;
      fill: var(--pink); -webkit-text-fill-color: unset;
      filter: drop-shadow(0 0 3px rgba(228,0,87,0.4));
    }

    /* Lang toggle mobile */
    .sp-lang {
      display: flex;
      align-items: center;
      gap: 2px;
      background: #f5f5f5;
      border-radius: 14px;
      padding: 2px;
      border: 1px solid #e0e0e0;
    }
    .sp-lang .lang-btn {
      padding: 3px 9px;
      font-size: 11px;
    }

    .sp-menu-btn {
      width: 40px; height: 40px;
      background: var(--pink); border-radius: 50%;
      border: none; cursor: pointer;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 4px;
      flex-shrink: 0;
    }
    .sp-menu-btn .b { display: block; width: 18px; height: 2px; background: white; border-radius: 1px; }

    /* =====================================================
       OVERLAY SIDE MENU
    ===================================================== */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 500; opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }
    .overlay.on { opacity: 1; pointer-events: all; }

    .side-menu {
      position: fixed; top: 0; left: -280px;
      width: 280px; height: 100%;
      background: white; z-index: 600;
      display: flex; flex-direction: column;
      transition: left 0.35s cubic-bezier(0.4,0,0.2,1);
      overflow-y: auto;
    }
    .side-menu.on { left: 0; }

    .sm-head {
      background: var(--pink); padding: 10px 16px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .sm-head .title { color: white; font-size: 18px; font-weight: 900; font-style: italic; }
    .sm-close {
      background: rgba(255,255,255,0.2); border: none;
      color: white; width: 32px; height: 32px;
      border-radius: 50%; font-size: 17px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    .sm-btns { padding: 16px 14px 20px; display: flex; flex-direction: column; gap: 8px; }
    .sm-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      text-align: center; padding: 13px;
      border-radius: 8px; font-size: 14px; font-weight: bold; color: white;
      transition: opacity 0.15s, transform 0.1s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    .sm-btn:hover  { opacity: 0.88; }
    .sm-btn:active { transform: scale(0.97); }

    /* =====================================================
       PAGE CONTENT
    ===================================================== */
    .page-wrap {
      max-width: 1000px;
      margin: 0 auto;
      padding: 16px 12px 90px;
    }

    /* =====================================================
       HERO BANNER
    ===================================================== */
    .hero-banner {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      border-radius: 8px;
      padding: 24px 20px;
      margin-bottom: 14px;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .hero-banner::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(ellipse at center, rgba(228,0,87,0.12) 0%, transparent 60%);
      animation: heroPulse 4s ease-in-out infinite;
    }

    @keyframes heroPulse {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50%       { transform: scale(1.1); opacity: 1; }
    }

    .hero-text { position: relative; z-index: 1; }
    .hero-title {
      font-size: 26px; font-weight: 900; font-style: italic;
      color: white; letter-spacing: 3px;
      text-shadow: 0 0 20px rgba(228,0,87,0.5);
      line-height: 1;
    }
    .hero-sub {
      font-size: 12px; color: rgba(255,255,255,0.65);
      margin-top: 6px; letter-spacing: 1px;
    }
    .hero-tag {
      display: inline-block;
      background: var(--pink);
      color: white; font-size: 10px; font-weight: bold;
      padding: 2px 8px; border-radius: 10px;
      margin-top: 8px; letter-spacing: 0.5px;
    }

    .hero-deco {
      position: relative; z-index: 1;
      font-size: 52px; opacity: 0.18;
      animation: heroDeco 6s ease-in-out infinite;
    }
    @keyframes heroDeco {
      0%, 100% { transform: translateY(0) rotate(-5deg); }
      50%       { transform: translateY(-8px) rotate(5deg); }
    }

    /* =====================================================
       SECTION HEAD
    ===================================================== */
    .sec-head {
      background: linear-gradient(to right, var(--pink) 0%, #ff6b8a 100%);
      color: white; padding: 10px 16px;
      font-size: 14px; font-weight: bold;
      margin-bottom: 12px; border-radius: 4px;
      display: flex; align-items: center; gap: 8px;
      animation: sweep 0.6s ease forwards;
      position: relative; overflow: hidden;
    }
    .sec-head::before { content: '◆'; font-size: 10px; opacity: 0.7; }
    .sec-head::after {
      content: '';
      position: absolute; top: 0; right: -100%;
      width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      animation: secShine 3s ease-in-out infinite;
    }
    @keyframes secShine {
      0%   { right: -100%; }
      50%, 100% { right: 100%; }
    }

    /* =====================================================
       LOADER
    ===================================================== */
    .loader { text-align: center; padding: 50px; }
    .spinner {
      display: inline-block;
      width: 40px; height: 40px;
      border: 4px solid #fce4ec;
      border-top-color: var(--pink);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* =====================================================
       MODEL GRID
    ===================================================== */
    .model-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    /* =====================================================
       MODEL CARD
    ===================================================== */
    .model-card {
      background: white;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      overflow: hidden; cursor: pointer;
      transition: box-shadow 0.25s, transform 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .model-card:hover {
      box-shadow: 0 10px 28px rgba(228,0,87,0.22);
      transform: translateY(-4px) scale(1.01);
    }

    .card-top {
      background: #444; color: white;
      font-size: 10px; text-align: center;
      padding: 3px 4px; letter-spacing: 0.3px;
    }

    .card-photo {
      position: relative; width: 100%;
      padding-top: 133%; overflow: hidden;
    }
    .card-photo img {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.45s ease;
    }
    .model-card:hover .card-photo img { transform: scale(1.07); }

    /* NewCast pulsing badge */
    @keyframes pulseBadge {
      0%, 100% { box-shadow: 0 0 0 0 rgba(228,0,87,0.5); }
      50%       { box-shadow: 0 0 0 4px rgba(228,0,87,0); }
    }

    .bdg {
      position: absolute; font-size: 9px;
      font-weight: bold; color: white;
      padding: 2px 7px; line-height: 1.5;
      letter-spacing: 0.3px;
    }
    .bdg-new     { top: 0; left: 0; background: var(--pink); animation: pulseBadge 1.8s ease-in-out infinite; }
    .bdg-photo   { top: 0; right: 0; background: var(--teal); }
    .bdg-status  {
      bottom: 0; left: 0; background: var(--teal);
      max-width: 72%; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }

    /* Tier badges */
    .bdg-luxury  {
      bottom: 0; right: 0;
      background: linear-gradient(135deg, #b8860b, #ffd54f);
      color: #1a1a1a; font-weight: 900;
      text-shadow: none;
    }
    .bdg-premium {
      bottom: 0; right: 0;
      background: linear-gradient(135deg, #6a1b9a, #ab47bc);
    }
    .bdg-standard {
      bottom: 0; right: 0;
      background: linear-gradient(135deg, #37474f, #607d8b);
    }

    .card-info { padding: 7px 6px 0; }

    .card-name {
      font-size: 12.5px; font-weight: bold;
      text-align: center; color: #111;
      line-height: 1.3;
    }

    .card-meas {
      font-size: 10px; text-align: center;
      color: #777; margin-top: 3px;
      letter-spacing: 0.2px;
    }
    .card-meas .cup { color: var(--pink); font-weight: bold; }

    .card-info { padding: 7px 6px 8px; }

    /* =====================================================
       EMPTY STATE (floating petals)
    ===================================================== */
    @keyframes floatPetal {
      0%   { transform: translateY(0) rotate(0deg); opacity: 0.7; }
      50%  { transform: translateY(-14px) rotate(180deg); opacity: 1; }
      100% { transform: translateY(0) rotate(360deg); opacity: 0.7; }
    }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center; padding: 60px 20px;
      color: #aaa;
    }
    .empty-petals {
      display: flex; justify-content: center; gap: 10px; margin-bottom: 16px;
    }
    .empty-petals span {
      font-size: 26px;
      display: inline-block;
      animation: floatPetal 2.4s ease-in-out infinite;
    }
    .empty-petals span:nth-child(2) { animation-delay: 0.4s; font-size: 20px; }
    .empty-petals span:nth-child(3) { animation-delay: 0.8s; font-size: 30px; }
    .empty-petals span:nth-child(4) { animation-delay: 1.2s; font-size: 18px; }
    .empty-petals span:nth-child(5) { animation-delay: 0.2s; font-size: 24px; }
    .empty-state .et { font-size: 16px; font-weight: bold; color: #555; margin-bottom: 8px; }
    .empty-state .es { font-size: 12px; }
    .empty-state a { color: var(--pink); font-weight: bold; }

    /* =====================================================
       MOBILE BOTTOM CTA
    ===================================================== */
    .mob-cta {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0;
      z-index: 400;
      box-shadow: 0 -3px 14px rgba(0,0,0,0.3);
    }
    .mob-cta-inner { display: flex; height: 58px; }
    .mob-cta-btn {
      flex: 1;
      display: flex; flex-direction: row;
      align-items: center; justify-content: center;
      gap: 7px; color: white;
      font-size: 13px; font-weight: 800;
      text-decoration: none;
      border-right: 1px solid rgba(255,255,255,0.25);
      transition: filter 0.15s;
    }
    .mob-cta-btn:last-child { border-right: none; }
    .mob-cta-btn:active { filter: brightness(0.82); }
    .mob-cta-btn svg { width: 22px; height: 22px; flex-shrink: 0; }
    .mob-cta-tg   { background: #42A5F5; }
    .mob-cta-line { background: #66BB6A; }
    .mob-cta-wa   { background: #2E7D32; }

    /* =====================================================
       SCROLL TO TOP
    ===================================================== */
    .btn-top {
      position: fixed; bottom: 70px; right: 16px;
      width: 42px; height: 42px;
      background: var(--pink); color: white;
      border: none; border-radius: 50%;
      font-size: 18px; cursor: pointer;
      box-shadow: 0 3px 10px rgba(228,0,87,0.4);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s, transform 0.2s;
      z-index: 300;
    }
    .btn-top.show { opacity: 1; pointer-events: all; }
    .btn-top:hover { transform: scale(1.1); }

    /* =====================================================
       FOOTER
    ===================================================== */
    .site-footer {
      background: #1a1a1a; color: #aaa;
      padding: 14px 20px 80px;
      text-align: center;
      font-size: 12px;
    }
    .footer-logo {
      font-size: 18px; font-weight: 900; font-style: italic;
      color: var(--pink); margin-bottom: 4px;
    }
    .footer-copy { color: #666; font-size: 11px; }

    /* =====================================================
       SAKURA BRANCHES
    ===================================================== */
    .sakura-bg {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
      overflow: hidden;
    }
    .sakura-br {
      position: absolute;
      opacity: 0.09;
    }
    .sakura-br-tr {
      top: -20px; right: -20px;
      width: 320px; height: 420px;
    }
    .sakura-br-bl {
      bottom: 60px; left: -30px;
      width: 260px; height: 360px;
      transform: scaleX(-1) rotate(15deg);
    }
    .sakura-br-mid {
      top: 40%; right: -40px;
      width: 180px; height: 250px;
      opacity: 0.06;
      transform: rotate(-20deg);
    }

    /* =====================================================
       RESPONSIVE
    ===================================================== */
    @media (max-width: 900px) {
      .model-grid { grid-template-columns: repeat(3, 1fr); }
    }

    @media (max-width: 768px) {
      .pc-header { display: none; }
      .pc-nav     { display: none; }
      .sp-header  { display: block; }
      .mob-cta    { display: block; }
      .btn-top    { bottom: 74px; }
      .page-wrap  { padding: 10px 8px 76px; }
      .model-grid { grid-template-columns: repeat(3, 1fr); gap: 6px; }
      .card-name  { font-size: 11px; }
      .card-meas  { font-size: 9px; }
      .hero-banner { padding: 18px 14px; }
      .hero-title  { font-size: 20px; }
      .hero-deco   { font-size: 38px; }
    }

    @media (max-width: 520px) {
      .model-grid { grid-template-columns: repeat(2, 1fr); gap: 5px; }
      .sec-head   { font-size: 13px; padding: 8px 12px; }
      .hero-deco  { display: none; }
    }
  </style>
</head>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://mqbsyxvebsjntbzuvtfu.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xYnN5eHZlYnNqbnRienV2dGZ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3OTE3MjQsImV4cCI6MjA4ODM2NzcyNH0.rPjPAspwjRBE3js_606VozG8wjpM6QHcUJwl2NZzZd8';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const numSeeds = [64,91,42,1062,1025,1041,1074,1031,1048,55,78,84];

    /* ---- Translations ---- */
    const T = {
      ja: {
        tagline:        '東京プレミアムモデル',
        hero_tag:       'TOKYO PREMIUM MODELS',
        fav_models:     '⭐ 厳選モデル',
        badge_photo:    '写メ',
        badge_new:      'NewCast',
        tier_luxury:    'ラグジュアリー',
        tier_premium:   'プレミアム',
        tier_standard:  'スタンダード',
        news_text:      'T7 TOKYOへようこそ！新人キャスト続々入店中！お気軽にご予約ください。',
        news_more:      '一覧 →',
        event_text:     '今日のイベント・割引情報はこちら！お得なキャンペーン実施中！',
        event_more:     '全て見る →',
        nav_tg:         'テレグラム',
        nav_line:       'LINE',
        nav_wa:         'ワッツアップ',
        status_avail:   '受付中',
        status_duty:    '出勤中',
        status_limited: '限定',
        status_vip:     'VIP',
        status_booked:  '予約済',
        schedule_title: '本日の出勤スケジュール SCHEDULE',
        empty_title:    '本日の出勤情報はございません',
        empty_sub:      'モデルは管理者パネルで追加できます',
        footer_hours:   '受付時間：9:00 ～ 翌4:00 　|　 東京都内全域派遣',
        footer_copy:    '© 2024 T7 TOKYO. All Rights Reserved.',
      },
      en: {
        tagline:        'Tokyo Premium Models',
        hero_tag:       'TOKYO PREMIUM MODELS',
        fav_models:     '⭐ Featured Models',
        badge_photo:    'Photo',
        badge_new:      'NewCast',
        tier_luxury:    'Luxury',
        tier_premium:   'Premium',
        tier_standard:  'Standard',
        news_text:      'Welcome to T7 TOKYO! New models joining daily. Book with ease!',
        news_more:      'More →',
        event_text:     "Today's events & discounts — special campaigns running now!",
        event_more:     'See all →',
        nav_tg:         'Telegram',
        nav_line:       'LINE',
        nav_wa:         'WhatsApp',
        status_avail:   'Available',
        status_duty:    'On Duty',
        status_limited: 'Limited',
        status_vip:     'VIP Only',
        status_booked:  'Reserved',
        schedule_title: "Today's Schedule",
        empty_title:    'No schedule for today',
        empty_sub:      'Models can be added in the admin panel',
        footer_hours:   'Hours: 9:00 AM – 4:00 AM  |  Delivery across all of Tokyo',
        footer_copy:    '© 2024 T7 TOKYO. All Rights Reserved.',
      }
    };

    let currentLang = localStorage.getItem('lang') || 'ja';

    /* Tier mapping: status_color → tier key + badge class */
    const tierMap = {
      's-pink':   { key: 'tier_luxury',   cls: 'bdg-luxury' },
      's-dark':   { key: 'tier_luxury',   cls: 'bdg-luxury' },
      's-teal':   { key: 'tier_premium',  cls: 'bdg-premium' },
      's-orange': { key: 'tier_standard', cls: 'bdg-standard' },
      's-sold':   { key: 'tier_standard', cls: 'bdg-standard' },
    };

    /* Status color → translation key */
    const statusKeyMap = {
      's-pink':   'status_avail',
      's-dark':   'status_vip',
      's-teal':   'status_duty',
      's-orange': 'status_limited',
      's-sold':   'status_booked',
    };

    function setLang(lang) {
      currentLang = lang;
      localStorage.setItem('lang', lang);
      /* Static data-i18n elements */
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (T[lang][key] !== undefined) el.textContent = T[lang][key];
      });
      /* Dynamic card badges */
      document.querySelectorAll('[data-badge]').forEach(el => {
        const key = el.dataset.badge;
        if (T[lang][key] !== undefined) el.textContent = T[lang][key];
      });
      /* Status text by color */
      document.querySelectorAll('[data-status-color]').forEach(el => {
        const color = el.dataset.statusColor;
        const key = statusKeyMap[color];
        el.textContent = (key && T[lang][key]) ? T[lang][key] : el.dataset.statusJa;
      });
      /* Lang buttons */
      document.querySelectorAll('.lang-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.lang === lang)
      );
    }

    /* ---- Menu ---- */
    function openMenu()  {
      document.getElementById('sideMenu').classList.add('on');
      document.getElementById('overlay').classList.add('on');
    }
    function closeMenu() {
      document.getElementById('sideMenu').classList.remove('on');
      document.getElementById('overlay').classList.remove('on');
    }

    /* ---- Scroll top ---- */
    const btnTop = document.getElementById('btnTop');
    window.addEventListener('scroll', () => btnTop.classList.toggle('show', scrollY > 300));

    /* ---- Card entrance observer ---- */
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.style.opacity = '1';
          e.target.style.transform = 'translateY(0)';
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.08 });

    /* ---- Load models ---- */
    async function init() {
      const { data: rows, error } = await sb
        .from('models')
        .select('*')
        .order('created_at', { ascending: false });

      document.getElementById('loader').style.display = 'none';

      const grid = document.getElementById('grid');

      if (error || !rows?.length) {
        const lang = currentLang;
        grid.innerHTML = `
          <div class="empty-state">
            <div class="empty-petals">
              <span>🌸</span><span>🌺</span><span>🌸</span><span>🌺</span><span>🌸</span>
            </div>
            <div class="et">${T[lang].empty_title}</div>
            <div class="es">${T[lang].empty_sub} — <a href="admin.html">admin</a></div>
          </div>`;
        return;
      }

      rows.forEach((row, i) => {
        const imgSrc = row.photo_url || `https://picsum.photos/seed/${numSeeds[i] || i+10}/300/400`;

        const card = document.createElement('div');
        card.className = 'model-card';
        card.style.cssText = 'opacity:0;transform:translateY(14px);transition:opacity 0.45s ease,transform 0.45s ease,box-shadow 0.25s,transform 0.2s';
        card.style.transitionDelay = `${Math.min(i, 8) * 55}ms`;
        card.onclick = () => location.href = `profile.html?id=${row.id}`;

        card.innerHTML = `
          <div class="card-top">${row.schedule}</div>
          <div class="card-photo">
            <img src="${imgSrc}" alt="${row.name}" loading="lazy"
                 onerror="this.src='https://picsum.photos/seed/${i+10}/300/400'">
            ${row.is_new    ? `<span class="bdg bdg-new" data-badge="badge_new">${T[currentLang].badge_new}</span>` : ''}
            ${row.has_photo ? `<span class="bdg bdg-photo" data-badge="badge_photo">${T[currentLang].badge_photo}</span>` : ''}
            <span class="bdg bdg-status" data-status-color="${row.status_color}" data-status-ja="${row.status}">${statusKeyMap[row.status_color] && T[currentLang][statusKeyMap[row.status_color]] ? T[currentLang][statusKeyMap[row.status_color]] : row.status}</span>
            ${tierMap[row.status_color] ? `<span class="bdg ${tierMap[row.status_color].cls}" data-badge="${tierMap[row.status_color].key}">${T[currentLang][tierMap[row.status_color].key]}</span>` : ''}
          </div>
          <div class="card-info">
            <div class="card-name">${row.name}(${row.age})</div>
            <div class="card-meas">T${row.height}-${row.bust}<span class="cup">${row.cup}</span>-${row.waist}-${row.hips}</div>
          </div>
        `;

        grid.appendChild(card);
        io.observe(card);
      });
    }

    /* ---- Boot ---- */
    setLang(currentLang);
    init();
  </script>
</body>
